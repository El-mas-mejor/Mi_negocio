<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6fa;
    }
    
    h2 {
        margin-bottom: 20px;
    }
    
    form {
        background: #ffffff;
        padding: 20px;
        max-width: 1000px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }
    
    input, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    
    button {
        margin-top: 15px;
        padding: 10px;
        background: #2ecc71;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
    }
    
    button:hover {
        background: #27ae60;
    }
    
    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
    }
    
    th, td {
        padding: 8px;
        border: 1px solid #ddd;
        text-align: center;
    }
    
    th {
        background: #2ecc71;
        color: white;
    }
    
    .fila {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }
    
    .col {
        flex: 1;
    }
    
    /* CONTENEDOR PRINCIPAL */
    .contenedor-tablas {
        display: flex;
        gap: 20px;
        margin-top: 20px;
    }
    
    /* BLOQUES */
    .bloque-tabla {
        flex: 1;
    }
    
    /* SCROLL TABLAS */
    .tabla-scroll {
        max-height: 250px;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin-top: 10px;
    }
    
    /* BOTÓN */
    .boton-guardar {
        margin-top: 20px;
        text-align: center;
    }
    
    .boton-guardar button {
        width: 200px;
    }
    @media (max-width: 600px) {

    .fila {
        display: block !important;
    }
    .contenedor-tablas {
        display: block !important;
    }

    form {
        padding: 10px;
    }

    input, textarea {
        font-size: 16px;
    }

}
    </style>
    
    <h2>Nuevo Repuesto</h2>
    <div id="error" style="color:red; margin-bottom:10px;"></div>
    
    <form method="post" onsubmit="guardar(event)">
    {% csrf_token %}
    
    <div class="fila">
        <div class="col">
            <label>Tipo:</label>
            <input list="tipos" name="tipo">
        </div>
    
        <div class="col">
            <label>Marca:</label>
            <input list="marcas" name="marca">
        </div>
    
        <div class="col">
            <label>Modelo:</label>
            <input list="modelos" name="modelo">
        </div>
    </div>
    
    <div class="fila">
        <div class="col">
            <label>Descripción:</label>
            <input type="text" name="descripcion">
        </div>
    </div>
    
    <div class="fila">
        <div class="col">
            <label>Precio compra:</label>
            <input type="text" name="precio_compra" id="precio_compra">
        </div>
    
        <div class="col">
            <label>Precio venta:</label>
            <input type="text" name="precio_venta" id="precio_venta">
        </div>
    </div>
    
    <div class="contenedor-tablas">
    
        <!-- MODELOS -->
        <div class="bloque-tabla">
    
            <h3>Compatibilidad (Modelos)</h3>
    
            <label>Pegar compatibilidad:</label>
            <textarea id="texto" rows="4"></textarea>
    
            <div class="tabla-scroll">
                <table id="tabla">
                    <tr>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>X</th>
                    </tr>
                </table>
            </div>
    
        </div>
    
        <!-- EQUIVALENCIAS -->
        <div class="bloque-tabla">
    
            <h3>Repuestos equivalentes</h3>
    
            <label>Pegar equivalencias:</label>
            <textarea id="texto_eq" rows="4"></textarea>
    
            <div class="tabla-scroll">
                <table id="tabla_eq">
                    <tr>
                        <th>Marca</th>
                        <th>Código</th>
                    </tr>
                </table>
            </div>
    
        </div>
    
    </div>
    
    <input type="hidden" name="texto" id="texto_final">
    <input type="hidden" name="equivalencias" id="equivalencias_final">
    <div class="boton-guardar">
        <button type="submit">Guardar</button>
    </div>
    
    </form>
    
    <script>
    
    function detectar() {
    
        let texto = document.getElementById("texto").value;
    
        fetch("/detectar/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({
                texto: texto,
                marca: document.querySelector('[name="marca"]').value
            })
        })
        .then(response => response.json())
        .then(data => {
    
            let tabla = document.getElementById("tabla");
    
            tabla.innerHTML = "<tr><th>Marca</th><th>Modelo</th><th>X</th></tr>";
    
            let modelosLimpios = limpiarDuplicados(data.modelos);
            modelosLimpios = ordenarModelos(modelosLimpios);
    
            modelosLimpios.forEach(item => {
                agregarFila(item.marca, item.modelo);
            });
    
            actualizarHidden();
        });
    }
    
    function detectarEquivalentes() {
    
        let texto = document.getElementById("texto_eq").value.toUpperCase();
    
        let tabla = document.getElementById("tabla_eq");
    
        tabla.innerHTML = "<tr><th>Marca</th><th>Código</th></tr>";
    
        let encontrados = texto.match(/[A-Z0-9\-]{4,}/g) || [];
    
        let unicos = [...new Set(encontrados)];
    
        unicos.forEach(codigo => {
    
            if (/^[A-Z0-9\-]{4,}$/.test(codigo)) {
    
                tabla.innerHTML += `
                    <tr>
                        <td>${document.querySelector('[name="marca"]').value}</td>
                        <td>${codigo}</td>
                    </tr>
                `;
            }
    
        });
    }
    
    function limpiarDuplicados(data) {
        const vistos = new Set();
        const resultado = [];
    
        data.forEach(item => {
            let modelo = item.modelo.trim().toUpperCase();
    
            if (!vistos.has(modelo)) {
                vistos.add(modelo);
                resultado.push({
                    marca: item.marca,
                    modelo: modelo
                });
            }
        });
    
        return resultado;
    }
    
    function ordenarModelos(data) {
        return data.sort((a, b) => a.modelo.localeCompare(b.modelo));
    }
    
    function esModeloValido(modelo) {
        modelo = modelo.trim();
    
        if (modelo.length < 5) return false;
        if (modelo.length > 25) return false;
    
        if (!/[0-9]/.test(modelo)) return false;
    
        return true;
    }
    
    function agregarFila(marca, modelo) {
    
        let tabla = document.getElementById("tabla");
        let row = tabla.insertRow();
    
        let celdaMarca = row.insertCell(0);
        let celdaModelo = row.insertCell(1);
        let celdaAccion = row.insertCell(2);
    
        celdaMarca.innerHTML = `<input value="${marca}">`;
    
        modelo = modelo.toUpperCase();
    
        let valido = esModeloValido(modelo);
        let color = valido ? "" : "style='background-color:#ffcccc'";
    
        celdaModelo.innerHTML = `<input value="${modelo}" ${color}>`;
        celdaAccion.innerHTML = `<button type="button" onclick="this.closest('tr').remove()">X</button>`;
    }
    
    function actualizarHidden() {
        let filas = document.querySelectorAll("#tabla tr");
    
        let datos = [];
    
        for (let i = 1; i < filas.length; i++) {
            let marca = filas[i].cells[0].children[0].value;
            let modelo = filas[i].cells[1].children[0].value;
    
            datos.push({marca, modelo});
        }
    
        document.getElementById("texto_final").value = JSON.stringify(datos);
    }

    function obtenerEquivalencias() {

    let filas = document.querySelectorAll("#tabla_eq tr");

    let lista = [];

    for (let i = 1; i < filas.length; i++) {

        let codigo = filas[i].cells[1].innerText.trim().toUpperCase();

        if (codigo) {
            lista.push(codigo);
        }
    }

    return lista;
}
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    document.addEventListener("DOMContentLoaded", function() {
    
        document.getElementById("texto").addEventListener("input", detectar);
    
        document.getElementById("texto_eq").addEventListener("input", detectarEquivalentes);

        document.getElementById("precio_compra").addEventListener("input", function() {
            formatearMiles(this);
        });

        document.getElementById("precio_venta").addEventListener("input", function() {
            formatearMiles(this);
        });
    
    
    });
    
    function guardar(event) {
    event.preventDefault();    
        let tipo = document.querySelector('[name="tipo"]').value.trim();
        let marca = document.querySelector('[name="marca"]').value.trim();
        let modelo = document.querySelector('[name="modelo"]').value.trim();
        let descripcion = document.querySelector('[name="descripcion"]').value.trim();

        let error = document.getElementById("error");
        error.style.color = "red";
        error.innerText = "";

// VALIDACIONES
        if (!tipo) {
           error.innerText = "Tipo requerido";
           return;
        }

        if (!marca) {
           error.innerText = "Marca requerida";
           return;
        }

        if (!modelo) {
           error.innerText = "Modelo requerido";
           return;
        }

        if (modelo.length < 3) {
           error.innerText = "Modelo inválido";
           return;
        }

        if (!descripcion) {
           error.innerText = "Descripción requerida";
           return;
        }

        if (descripcion.length < 5) {
           error.innerText = "Descripción muy corta";
           return;
        }
        
        let precioCompra = document.getElementById("precio_compra").value.replace(/\./g, "");
        let precioVenta = document.getElementById("precio_venta").value.replace(/\./g, "");

// validar que sean números si tienen valor
        if (precioCompra && isNaN(precioCompra)) {
           error.innerText = "Precio compra inválido";
           return;
        }

        if (precioVenta && isNaN(precioVenta)) {
           error.innerText = "Precio venta inválido";
           return;
        }

// opcional: evitar negativos
        if (precioCompra && Number(precioCompra) < 0) {
           error.innerText = "Precio compra no puede ser negativo";
           return;
        }

        if (precioVenta && Number(precioVenta) < 0) {
           error.innerText = "Precio venta no puede ser negativo";
           return;
        }
        
            
        actualizarHidden();
    
        let equivalencias = obtenerEquivalencias();
        document.getElementById("equivalencias_final").value = JSON.stringify(equivalencias);

        let filas = document.querySelectorAll("#tabla tr");
    
        if (filas.length <= 1) {
            document.getElementById("error").innerText = "No hay modelos detectados";
            return;
        }

        // quitar puntos antes de enviar
document.getElementById("precio_compra").value =
    document.getElementById("precio_compra").value.replace(/\./g, "");

document.getElementById("precio_venta").value =
    document.getElementById("precio_venta").value.replace(/\./g, "");
    
        let formData = new FormData(document.querySelector("form"));
    
    
        fetch("", {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {

    if (data.error) {
        document.getElementById("error").innerText = data.error;
        return;
    }

    // LIMPIAR FORMULARIO
    document.querySelector("form").reset();

    // LIMPIAR TABLAS
    document.getElementById("tabla").innerHTML = "<tr><th>Marca</th><th>Modelo</th><th>X</th></tr>";
    document.getElementById("tabla_eq").innerHTML = "<tr><th>Marca</th><th>Código</th></tr>";

    // LIMPIAR MENSAJE
    document.getElementById("error").innerText = "";

    error.style.color = "green";
    error.innerText = "Guardado correctamente";
});
    }
    function formatearMiles(input) {

    let valor = input.value.replace(/\D/g, "");

    valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

    input.value = valor;
}


    </script>
